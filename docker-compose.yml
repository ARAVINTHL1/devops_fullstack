services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ms-garments-hub

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ms-garments-hub
      API_PORT: 5000

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api

volumes:
  mongodb_data:
